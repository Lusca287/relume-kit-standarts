<!DOCTYPE html>
<html lang="pt-Br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>One</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
            border: none;
            background: none;

            font-family: "Roboto", sans-serif;
            font-style: normal;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background-image: url(https://png.pngtree.com/background/20220725/original/pngtree-urban-cityscape-city-skyline-modern-picture-image_1761399.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            backdrop-filter: grayscale(200%);

        }

        header {
            display: flex;
            height: 70%;
            width: 90%;
        }

        aside {
            width: 53%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
        }

        h1 {
            width: 75%;
            font-size: 56px;
        }

        p {
            width: 75%;
            font-size: 18px;
        }


        .btn-wrapper {
            display: flex;
            gap: 16px;

        }

        .btn-wrapper>button {
            padding: 12px 24px;
            border: 1px solid black;
        }



        #btn-secondary {
            background-color: none;
            color: rgb(0, 0, 0);

            position: relative;
        }

        #first-b:hover {
            box-shadow: 0 0 20px #000000,
                0 0 40px #000000;
        }

        #btn-secondary::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgb(0, 0, 0);
            /* ou qualquer cor */

            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
            ;

        }

        #btn-secondary:hover::before {
            transform: scaleX(1);
        }



        #btn-secondary>span {
            position: relative;
            z-index: 999;
        }

        #btn-secondary:hover>span {
            color: #ffffff;
        }

        #third-b {
            transition: transform 0.6s;
        }

        #third-b:hover {
            transform: translateY(-2px) rotateX(360deg);
        }

        @keyframes shakeX {
            0% {
                transform: translateX(-5);
            }

            25% {
                transform: translateX(5px);
            }

            50% {
                transform: translateX(-3px);
            }

            75% {
                transform: translateX(3px);
            }

            100% {
                transform: translateX(0);
            }
        }


        #fourth-b:hover {
            animation: shakeX 0.55s;
        }

        #fifth-b {
            background-color: none;
            color: rgb(0, 0, 0);

            position: relative;
        }

        #fifth-b::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgb(0, 0, 0);
            /* ou qualquer cor */

            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
            ;
        }

        #fifth-b:hover::before {
            transform: scaleX(1);
        }

        #fifth-b>span {
            position: relative;
            z-index: 999;
        }

        #fifth-b:hover>span {
            color: #ffffff;
        }

        @keyframes terremoto {
            0% {
                transform: rotateZ(0deg);
            }

            10% {
                transform: rotateZ(10deg);
            }

            20% {
                transform: rotateZ(20deg);
            }

            30% {
                transform: rotateZ(10deg);
            }

            40% {
                transform: rotateZ(0deg);
            }

            50% {
                transform: rotateZ(-10deg);
            }

            60% {
                transform: rotateZ(-20deg);
            }

            70% {
                transform: rotateZ(-10deg);
            }

            100% {
                transform: rotateZ(0deg);
            }
        }



        #fifth-b:active {
            box-shadow: 0 0 20px #33ff00,
                0 0 40px #000000;
            animation: terremoto 0.6s;

            span {
                color: #33ff00;
            }
        }

        #first-b:focus,
        #third-b:focus,
        #fourth-b:focus {
            outline: none;
            /* Remove a borda padrão do navegador */
            border: 2px solid #34d0db;
            background-color: #f0f8ff;
        }

        /* Estiliza campos obrigatórios com uma borda amarela suave */
        input:required {
            border-left: 5px solid #0ff12d;
        }

        /* Quando o campo obrigatório está vazio ou o formato está errado (ex: e-mail sem @) */
        input:invalid {
            border-color: #e74c3c;
            color: #e74c3c;
        }

        /* Dica: use :focus para não mostrar o erro vermelho assim que a página carrega */
        input:invalid:focus {
            background-color: #ffffff;
        }


        form>button{
            border: 2px solid black;
            padding-top: 5px;
            padding-bottom: 5px;
            padding-left: 8px;
            padding-right: 8px;
        }

        input{
            background-color: #ffffff;
            padding-top: 5px;
            padding-bottom: 5px;
            padding-left: 8px;
            padding-right: 8px;
            border-radius: 5%;
        }

    </style>

</head>

<body>

    <header>
        <aside>
            <h1>Medium length hero headline goes here</h1><br>
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum
                tristique. Duis cursus, mi quis viverra ornare, eros dolor interdum nulla, ut commodo diam libero vitae
                erat.
            </p><br>
            <div class="btn-wrapper">
                <button id="first-b"><span>Button</span></button>
                <button id="btn-secondary"><span>Button</span></button>
                <button id="third-b">Button</button>
                <button id="fourth-b">Button</button>
                <button id="fifth-b"><span>Button</span></button>
            </div>
            <br><br><br>

            <form>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="Escreva seu email">
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </form>

        </aside>
        <img width="47%" height="100%" style="filter: grayscale(100%);"
            src="https://i.kym-cdn.com/photos/images/original/003/023/762/d82" alt="Invencivel">
    </header>

</body>

</html>
