<!DOCTYPE html>
<html lang="pt-Br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>One</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
            border: none;
            background: none;

            font-family: "Roboto", sans-serif;
            font-style: normal;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

        }

        header {
            display: flex;
            height: 70%;
            width: 90%;
        }

        aside {
            width: 53%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
        }

        h1 {
            width: 75%;
            font-size: 56px;
        }

        p {
            width: 75%;
            font-size: 18px;
        }


        .btn-wrapper {
            display: flex;
            gap: 16px;

        }

        .btn-wrapper>button {
            padding: 12px 24px;
            border: 1px solid black;
        }



        #btn-secondary {
            background-color: #000;
            color: white;

            position: relative;
        }

        .btn-wrapper>button:hover {
            box-shadow: 0 0 22px #000000,
                0 0 44px #000000;
        }

        #btn-secondary::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgb(255, 255, 255);
            /* ou qualquer cor */

            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
            ;

        }

        #btn-secondary:hover::before {
            transform: scaleX(1);
        }



        #btn-secondary>span {
            position: relative;
            z-index: 999;
        }

        #btn-secondary:hover>span {
            color: #ff0000;
        }

        #third-b {
            transition: transform 0.6s;
        }

        #third-b:hover {
            transform: translateY(-2px) rotateX(360deg);
        }

        @keyframes shakeX {
            0% {
                transform: translateX(-5);
            }

            25% {
                transform: translateX(5px);
            }

            50% {
                transform: translateX(-3px);
            }

            75% {
                transform: translateX(3px);
            }

            100% {
                transform: translateX(0);
            }
        }


        #fourth-b:hover {
            animation: shakeX 0.55s;
        }
    </style>

</head>

<body>

    <header>
        <aside>
            <h1>Medium length hero headline goes here</h1><br>
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum
                tristique. Duis cursus, mi quis viverra ornare, eros dolor interdum nulla, ut commodo diam libero vitae
                erat.
            </p><br>
            <div class="btn-wrapper">
                <button id="btn-secondary"><span>Button</span></button>
                <button><span>Button</span></button>
                <button id="third-b">Button</button>
                <button id="fourth-b">Button</button>
            </div>
        </aside>
        <img width="47%" height="100%" style="filter: grayscale(100%);"
            src="https://i.kym-cdn.com/photos/images/original/003/023/762/d82"
            alt="Invencivel">
    </header>

</body>

</html>
