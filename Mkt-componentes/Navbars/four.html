<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>One</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
            border: none;
            background: none;

            font-family: "Roboto", sans-serif;
            font-style: normal;
        }

        a {
            font-size: 16px;
            font-weight: 400;
            color: black;
        }

        header {
            width: 100%;
            height: 72px;

            display: flex;
            padding: 0 64px;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid black;
        }

        header>img {
            width: 80px;
            height: 40px;
        }

        .header-nav {
            display: flex;
            gap: 34px;
            align-items: center;
            justify-content: center;
        }

        button>img {
            width: 24px;
            height: 24px;
        }
        .aside-nav>button {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            
            p{
                font-size: 16px;
                font-weight: 400;
                color: #000;
            }
        }

        nav {
            width: 10%;
            height: 92.3vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-right: 1px solid black;
            gap: 32px;
        }

        .btn-wrapper{
            display: flex;
            gap: 16px;
        }

        .btn-wrapper>button{
            padding: 8px 20px;
            border: 1px solid black;
        }

        .btn-secondary{
            background-color: #000;
            color: white;
        }

        .aside-nav{
            height: 30vh;
            display: flex;
            flex-direction: column;
            gap: 24px;
            
        }

    </style>
</head>

<body>
    <header>
        <img src="Assets/Imagens/companylogo.svg" alt="Logo">
        <div class="header-nav">
            <div class="btn-wrapper">
                <button>Button</button>
                <button class="btn-secondary">Button</button>
            </div>
        </div>
    </header>
    <aside>
        <nav>
            <div class="aside-nav">
                <a href="">Link One</a>
                <a href="">Link Two</a>
                <a href="">Link Three</a>
                <button>
                    <p>Link Four</p>
                    <img src="Assets/Imagens/chevrondown.svg" alt="Drop">
                </button>
            </div>
        </nav>
    </aside>
</body>

</html>
